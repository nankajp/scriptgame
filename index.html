<!doctype html>
<html lang="ja">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />
		<title>Grid Rotate Puzzle</title>
		<link rel="stylesheet" href="css/style.css">
	</head>
	<body>
			<div class="container">
				<div id="startScreen" style="display:flex;align-items:center;justify-content:center;flex-direction:column;padding:40px;">
					<h1 style="margin:0 0 12px 0">Grid Rotate Puzzle</h1>
					<div style="margin-bottom:12px">Click Start to begin</div>
					<div style="display:flex;gap:8px;align-items:center">
						<label class="info">Rows</label>
						<select id="rowsSel"></select>
						<label class="info">Cols</label>
						<select id="colsSel"></select>
					</div>
					<button id="btnStart" style="margin-top:12px">Start</button>
				</div>

				<div id="gameArea" style="display:none">
					<div class="header">
						<div class="title">Grid Rotate Puzzle</div>
						<div class="controls">
							<div class="info">Time: <span id="timer">0:00</span></div>
							<div class="info" style="margin-left:8px">Moves: <span id="moves">0</span></div>
							<button id="btnReset">New</button>
						</div>
					</div>

										<div id="gameWrapper">
											<canvas id="gameCanvas"></canvas>
										</div>

					<div class="footer">Click any cell to rotate its tile clockwise. Connect A -> B with a continuous path to win.</div>
				</div>
			</div>

			<script src="js/game.js"></script>
			<script>
				// controls init
				const rowsSel=document.getElementById('rowsSel'), colsSel=document.getElementById('colsSel');
				[5,6,7,8,9,10].forEach(n=>{ let o=document.createElement('option'); o.value=n; o.text=n; rowsSel.add(o); });
				[5,6,7,8,9,10].forEach(n=>{ let o=document.createElement('option'); o.value=n; o.text=n; colsSel.add(o); });
				// default to 5 x 5 (cols x rows)
				rowsSel.value=10; colsSel.value=5;

				const startBtn = document.getElementById('btnStart');
				const startScreen = document.getElementById('startScreen');
				const gameArea = document.getElementById('gameArea');
				const resetBtn = document.getElementById('btnReset');
				const timerEl = document.getElementById('timer');
				const movesEl = document.getElementById('moves');

						startBtn.addEventListener('click',()=>{
						let r=parseInt(rowsSel.value,10), c=parseInt(colsSel.value,10);
							startScreen.style.display='none';
							gameArea.style.display='block';
							window.game.setSize(r,c);
							window.game.startGame();
						});

				resetBtn.addEventListener('click',()=>{
					const r=parseInt(rowsSel.value,10), c=parseInt(colsSel.value,10);
					window.game.setSize(r,c);
					window.game.startGame();
					// ensure HUD resets
					window.game.updateHUD();
				});

				// expose HUD elements to game logic
				window.game.hud = { timerEl, movesEl, startScreen, gameArea };
			</script>
	</body>
</html>
